[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Utility pages
[[redirects]]
  from = "/thanks"
  to = "/thanks.html"
  status = 200

# Retired narrative companion (May 12, 2026) — single-surface flowchart going forward
[[redirects]]
  from = "/scroll-system/narrative.html"
  to = "/scroll-system/"
  status = 301

# Checklist pages
[[redirects]]
  from = "/checklists/medspa"
  to = "/checklists-medspa.html"
  status = 200

# Route API calls to serverless functions
[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  from = "/api/validate-token"
  to = "/.netlify/functions/validate-token"
  status = 200

[[redirects]]
  from = "/api/dashboard-auth"
  to = "/.netlify/functions/dashboard-auth"
  status = 200

[[redirects]]
  from = "/api/dashboard-session"
  to = "/.netlify/functions/dashboard-session"
  status = 200

[[redirects]]
  from = "/api/metricool-data"
  to = "/.netlify/functions/metricool-data"
  status = 200

[[redirects]]
  from = "/api/subscribe"
  to = "/.netlify/functions/subscribe"
  status = 200

[[redirects]]
  from = "/api/check-subscriber"
  to = "/.netlify/functions/check-subscriber"
  status = 200

# Security headers
[[headers]]
  for = "/access/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"


# ─────────────────────────────────────────────────────────────────────
# Password gate model (May 2026)
# ─────────────────────────────────────────────────────────────────────
# tools.scrollmedia.co uses a client-side password gate baked per-HTML-file
# (sessionStorage key sm_tools_auth, password: scrollies).
#
# Gated pages: /, /dashboard, /bd-portal/ — password gate present in HTML
# Public pages: /growth-manual/ — NO password gate (public lead magnet)
#
# To gate a new page: inject the standard pw-overlay block above <body>.
# To exempt a new page from gating: do not inject the block.
# ─────────────────────────────────────────────────────────────────────
