[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Checklist pages
[[redirects]]
  from = "/checklists/medspa"
  to = "/checklists-medspa.html"
  status = 200

# Route API calls to serverless functions
[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  from = "/api/validate-token"
  to = "/.netlify/functions/validate-token"
  status = 200

[[redirects]]
  from = "/api/dashboard-auth"
  to = "/.netlify/functions/dashboard-auth"
  status = 200

[[redirects]]
  from = "/api/dashboard-session"
  to = "/.netlify/functions/dashboard-session"
  status = 200

[[redirects]]
  from = "/api/metricool-data"
  to = "/.netlify/functions/metricool-data"
  status = 200

[[redirects]]
  from = "/api/subscribe"
  to = "/.netlify/functions/subscribe"
  status = 200

# Security headers
[[headers]]
  for = "/access/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
