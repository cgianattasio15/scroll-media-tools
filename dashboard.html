<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance Dashboard — Scroll Media</title>
<link rel="icon" href="/scroll-favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════════════
   SCROLL MEDIA — INTERNAL PERFORMANCE DASHBOARD
   Design System: Scheme A (Dark / Authority)
   ═══════════════════════════════════════════════════════════════════ */
:root {
  --shadow:     #0d0e10;
  --navy:       #111827;
  --navy-mid:   #1a2235;
  --navy-card:  #1e2a3a;
  --navy-hover: #243044;
  --azure:      #0c3387;
  --azure-light:#1a4aad;
  --azure-glow: rgba(12,51,135,0.25);
  --highlight:  #e2ed7a;
  --hl-dim:     rgba(226,237,122,0.12);
  --hl-border:  rgba(226,237,122,0.25);
  --green:      #22c55e;
  --green-dim:  rgba(34,197,94,0.12);
  --red:        #ef4444;
  --red-dim:    rgba(239,68,68,0.12);
  --amber:      #f59e0b;
  --amber-dim:  rgba(245,158,11,0.12);
  --text-1:     #f0f4ff;
  --text-2:     rgba(240,244,255,0.65);
  --text-3:     rgba(240,244,255,0.38);
  --border:     rgba(240,244,255,0.07);
  --border-mid: rgba(240,244,255,0.12);
  --radius-sm:  6px;
  --radius:     10px;
  --radius-lg:  16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--shadow);
  color: var(--text-1);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--navy); }
::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(240,244,255,0.2); }

/* ══════════════════════════════════════════════════════════════════
   LOGIN SCREEN
   ══════════════════════════════════════════════════════════════════ */
#login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: radial-gradient(ellipse at 50% 0%, rgba(12,51,135,0.3) 0%, var(--shadow) 70%);
}
.login-card {
  width: 100%;
  max-width: 420px;
  padding: 48px 40px;
  background: var(--navy-card);
  border: 1px solid var(--border-mid);
  border-radius: var(--radius-lg);
  box-shadow: 0 24px 80px rgba(0,0,0,0.6);
}
.login-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
}
.login-logo img { height: 28px; width: auto; }
.login-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--hl-dim);
  border: 1px solid var(--hl-border);
  color: var(--highlight);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 100px;
}
.login-title {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text-1);
  margin-bottom: 6px;
}
.login-sub {
  font-size: 13px;
  color: var(--text-3);
  margin-bottom: 32px;
}
.form-group {
  margin-bottom: 16px;
}
.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
  margin-bottom: 6px;
  letter-spacing: 0.3px;
}
.form-input {
  width: 100%;
  padding: 11px 14px;
  background: var(--navy);
  border: 1px solid var(--border-mid);
  border-radius: var(--radius-sm);
  color: var(--text-1);
  font-size: 14px;
  font-family: inherit;
  transition: border-color 0.15s, box-shadow 0.15s;
  outline: none;
}
.form-input:focus {
  border-color: var(--azure-light);
  box-shadow: 0 0 0 3px var(--azure-glow);
}
.form-input::placeholder { color: var(--text-3); }
.btn-login {
  width: 100%;
  padding: 13px;
  background: var(--azure);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.15s, transform 0.1s;
  letter-spacing: 0.2px;
}
.btn-login:hover { background: var(--azure-light); }
.btn-login:active { transform: scale(0.99); }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
.login-error {
  margin-top: 12px;
  padding: 10px 14px;
  background: var(--red-dim);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: var(--radius-sm);
  color: #fca5a5;
  font-size: 13px;
  display: none;
}

/* ══════════════════════════════════════════════════════════════════
   MAIN APP LAYOUT
   ══════════════════════════════════════════════════════════════════ */
#app { display: none; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: 240px;
  background: var(--navy);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 50;
  overflow-y: auto;
}
.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.sidebar-logo img { height: 22px; width: auto; }
.sidebar-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--hl-dim);
  border: 1px solid var(--hl-border);
  color: var(--highlight);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 100px;
}
.sidebar-user {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}
.sidebar-user-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-1);
}
.sidebar-user-role {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 2px;
}
.sidebar-nav {
  padding: 12px 10px;
  flex: 1;
}
.nav-section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 8px 10px 6px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  color: var(--text-2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
  text-decoration: none;
  margin-bottom: 1px;
}
.nav-item:hover { background: var(--navy-hover); color: var(--text-1); }
.nav-item.active { background: var(--azure-glow); color: var(--highlight); }
.nav-item .nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-item .nav-count {
  margin-left: auto;
  font-size: 10px;
  font-weight: 700;
  background: var(--border-mid);
  padding: 2px 7px;
  border-radius: 100px;
  color: var(--text-3);
}
.nav-item.active .nav-count { background: var(--hl-dim); color: var(--highlight); }
.sidebar-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
}
.btn-sync {
  width: 100%;
  padding: 10px;
  background: var(--hl-dim);
  border: 1px solid var(--hl-border);
  border-radius: var(--radius-sm);
  color: var(--highlight);
  font-size: 12px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  letter-spacing: 0.3px;
}
.btn-sync:hover { background: rgba(226,237,122,0.18); }
.btn-sync:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-sync .spin { display: inline-block; }
.btn-sync.loading .spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.last-sync {
  font-size: 10px;
  color: var(--text-3);
  text-align: center;
  margin-top: 8px;
}
.btn-logout {
  width: 100%;
  padding: 8px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-3);
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  margin-top: 8px;
  transition: border-color 0.15s, color 0.15s;
}
.btn-logout:hover { border-color: var(--red); color: #fca5a5; }

/* ── MAIN CONTENT ── */
.main {
  margin-left: 240px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.topbar {
  position: sticky;
  top: 0;
  z-index: 40;
  background: rgba(13,14,16,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.topbar-title {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -0.3px;
  color: var(--text-1);
}
.topbar-period {
  font-size: 12px;
  color: var(--text-3);
  background: var(--border);
  padding: 4px 10px;
  border-radius: 100px;
}
.topbar-right { display: flex; align-items: center; gap: 12px; }
.health-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 100px;
}
.health-pill.good { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
.health-pill.mid { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
.health-pill.low { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
.health-dot { width: 7px; height: 7px; border-radius: 50%; }
.health-pill.good .health-dot { background: var(--green); }
.health-pill.mid .health-dot { background: var(--amber); }
.health-pill.low .health-dot { background: var(--red); }

/* ── CONTENT AREA ── */
.content { padding: 28px 32px 64px; flex: 1; }

/* ══════════════════════════════════════════════════════════════════
   EXECUTIVE VIEW — AGENCY OVERVIEW
   ══════════════════════════════════════════════════════════════════ */
.view { display: none; }
.view.active { display: block; }

/* ── AGENCY STAT CARDS ── */
.agency-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.15s;
}
.stat-card:hover { border-color: var(--border-mid); }
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--azure), var(--azure-light));
  opacity: 0;
  transition: opacity 0.15s;
}
.stat-card:hover::before { opacity: 1; }
.stat-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.stat-value {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -1px;
  color: var(--text-1);
  line-height: 1;
  margin-bottom: 6px;
}
.stat-value.highlight { color: var(--highlight); }
.stat-sub {
  font-size: 11px;
  color: var(--text-3);
}
.stat-icon {
  position: absolute;
  top: 18px; right: 18px;
  font-size: 22px;
  opacity: 0.15;
}

/* ── SECTION HEADER ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-2);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::before {
  content: '';
  display: block;
  width: 3px;
  height: 14px;
  background: var(--highlight);
  border-radius: 2px;
}

/* ── AM COLUMNS (EXEC VIEW) ── */
.am-columns {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 28px;
}
.am-column {
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.am-column-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.am-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 800;
  flex-shrink: 0;
}
.am-avatar.riley { background: rgba(139,92,246,0.2); color: #a78bfa; }
.am-avatar.emily { background: rgba(236,72,153,0.2); color: #f472b6; }
.am-avatar.rachel { background: rgba(20,184,166,0.2); color: #2dd4bf; }
.am-name { font-size: 13px; font-weight: 700; color: var(--text-1); }
.am-count { font-size: 11px; color: var(--text-3); margin-top: 1px; }
.am-health-score {
  margin-left: auto;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.am-health-score.good { color: var(--green); }
.am-health-score.mid { color: var(--amber); }
.am-health-score.low { color: var(--red); }
.am-accounts { padding: 10px; }

/* ── ACCOUNT MINI CARD ── */
.account-mini {
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.12s;
  margin-bottom: 4px;
  border: 1px solid transparent;
}
.account-mini:hover { background: var(--navy-hover); border-color: var(--border); }
.account-mini:last-child { margin-bottom: 0; }
.account-mini-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.account-mini-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-1);
}
.account-mini-stage {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 100px;
}
.stage-spark { background: rgba(99,102,241,0.15); color: #818cf8; }
.stage-lift  { background: rgba(59,130,246,0.15); color: #60a5fa; }
.stage-rise  { background: var(--hl-dim); color: var(--highlight); }
.account-mini-handle {
  font-size: 11px;
  color: var(--text-3);
  margin-bottom: 8px;
}
.account-mini-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.account-mini-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s ease;
}
.bar-good  { background: var(--green); }
.bar-mid   { background: var(--amber); }
.bar-low   { background: var(--red); }
.account-mini-kpis {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.kpi-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.kpi-dot.above { background: var(--green); }
.kpi-dot.on-track { background: var(--amber); }
.kpi-dot.below { background: var(--red); }
.kpi-dot.unknown { background: var(--border-mid); }

/* ══════════════════════════════════════════════════════════════════
   ACCOUNT DETAIL VIEW
   ══════════════════════════════════════════════════════════════════ */
.account-detail-header {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 24px;
  padding: 24px;
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
}
.account-detail-info { flex: 1; }
.account-detail-name {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text-1);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.account-detail-meta {
  font-size: 13px;
  color: var(--text-3);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.account-detail-meta span { display: flex; align-items: center; gap: 4px; }
.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-3);
  cursor: pointer;
  padding: 7px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  font-family: inherit;
  transition: all 0.15s;
  flex-shrink: 0;
}
.back-btn:hover { border-color: var(--border-mid); color: var(--text-1); }

/* ── FUNNEL GOALS ── */
.funnel-goals {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.funnel-card {
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
}
.funnel-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}
.funnel-card.tofu::before { background: linear-gradient(90deg, #6366f1, #818cf8); }
.funnel-card.mofu::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
.funnel-card.bofu::before { background: linear-gradient(90deg, var(--highlight), #c8d95a); }
.funnel-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.funnel-card.tofu .funnel-label { color: #818cf8; }
.funnel-card.mofu .funnel-label { color: #60a5fa; }
.funnel-card.bofu .funnel-label { color: var(--highlight); }
.funnel-stage-name {
  font-size: 10px;
  color: var(--text-3);
  margin-bottom: 8px;
}
.funnel-goal-text {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-1);
  line-height: 1.45;
}

/* ── KPI GRID ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.kpi-card {
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.15s;
}
.kpi-card:hover { border-color: var(--border-mid); }
.kpi-card.above { border-color: rgba(34,197,94,0.25); }
.kpi-card.on-track { border-color: rgba(245,158,11,0.25); }
.kpi-card.below { border-color: rgba(239,68,68,0.25); }
.kpi-card-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}
.kpi-card-value {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.8px;
  line-height: 1;
  margin-bottom: 4px;
}
.kpi-card.above .kpi-card-value { color: var(--green); }
.kpi-card.on-track .kpi-card-value { color: var(--amber); }
.kpi-card.below .kpi-card-value { color: var(--red); }
.kpi-card.unknown .kpi-card-value { color: var(--text-3); }
.kpi-card-target {
  font-size: 10px;
  color: var(--text-3);
  margin-bottom: 10px;
}
.kpi-progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.kpi-progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.8s ease;
}
.kpi-card.above .kpi-progress-fill { background: var(--green); }
.kpi-card.on-track .kpi-progress-fill { background: var(--amber); }
.kpi-card.below .kpi-progress-fill { background: var(--red); }
.kpi-status-badge {
  position: absolute;
  top: 12px; right: 12px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 100px;
}
.kpi-card.above .kpi-status-badge { background: var(--green-dim); color: var(--green); }
.kpi-card.on-track .kpi-status-badge { background: var(--amber-dim); color: var(--amber); }
.kpi-card.below .kpi-status-badge { background: var(--red-dim); color: var(--red); }
.kpi-card.unknown .kpi-status-badge { background: var(--border); color: var(--text-3); }

/* ── SPARKLINE SECTION ── */
.sparkline-section {
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  margin-bottom: 24px;
}
.sparkline-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.sparkline-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-1);
}
.sparkline-sub {
  font-size: 11px;
  color: var(--text-3);
}
.sparkline-chart-wrap {
  height: 120px;
  position: relative;
}

/* ── POSTS ACTIVITY ── */
.posts-section {
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
}
.posts-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-top: 16px;
}
.post-stat {
  text-align: center;
  padding: 14px;
  background: var(--navy);
  border-radius: var(--radius-sm);
}
.post-stat-value {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text-1);
}
.post-stat-label {
  font-size: 10px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 4px;
}

/* ══════════════════════════════════════════════════════════════════
   AM VIEW — ACCOUNT LIST
   ══════════════════════════════════════════════════════════════════ */
.account-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.account-row {
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: center;
}
.account-row:hover { border-color: var(--border-mid); background: var(--navy-hover); }
.account-row-left {}
.account-row-name {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -0.3px;
  color: var(--text-1);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.account-row-meta {
  font-size: 12px;
  color: var(--text-3);
  margin-bottom: 12px;
}
.account-row-kpis {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.kpi-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 100px;
}
.kpi-chip.above { background: var(--green-dim); color: var(--green); }
.kpi-chip.on-track { background: var(--amber-dim); color: var(--amber); }
.kpi-chip.below { background: var(--red-dim); color: var(--red); }
.kpi-chip.unknown { background: var(--border); color: var(--text-3); }
.account-row-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}
.account-health-score {
  font-size: 32px;
  font-weight: 900;
  letter-spacing: -1.5px;
  line-height: 1;
}
.account-health-score.good { color: var(--green); }
.account-health-score.mid { color: var(--amber); }
.account-health-score.low { color: var(--red); }
.account-health-label {
  font-size: 10px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.account-sparkline-wrap {
  width: 100px;
  height: 36px;
}

/* ══════════════════════════════════════════════════════════════════
   LOADING STATE
   ══════════════════════════════════════════════════════════════════ */
.loading-overlay {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 32px;
  gap: 16px;
}
.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--highlight);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-text {
  font-size: 13px;
  color: var(--text-3);
}

/* ══════════════════════════════════════════════════════════════════
   EMPTY / ERROR STATES
   ══════════════════════════════════════════════════════════════════ */
.empty-state {
  text-align: center;
  padding: 60px 32px;
  color: var(--text-3);
}
.empty-state-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
.empty-state-title { font-size: 15px; font-weight: 700; color: var(--text-2); margin-bottom: 6px; }
.empty-state-sub { font-size: 13px; }

/* ══════════════════════════════════════════════════════════════════
   UTILITY
   ══════════════════════════════════════════════════════════════════ */
.divider {
  height: 1px;
  background: var(--border);
  margin: 24px 0;
}
.tag {
  display: inline-flex;
  align-items: center;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 100px;
}
.tag-azure { background: var(--azure-glow); color: #60a5fa; }

/* ══════════════════════════════════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════════════════════════════════ */
@media (max-width: 1200px) {
  .kpi-grid { grid-template-columns: repeat(3, 1fr); }
  .agency-stats { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 900px) {
  .sidebar { width: 200px; }
  .main { margin-left: 200px; }
  .am-columns { grid-template-columns: 1fr; }
  .funnel-goals { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════
     LOGIN SCREEN
     ═══════════════════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <img src="/scroll-media-logo.svg" alt="Scroll Media" onerror="this.style.display='none'">
      <div class="login-badge">⚡ Internal</div>
    </div>
    <h1 class="login-title">Performance Dashboard</h1>
    <p class="login-sub">Sign in to access your account data and KPI tracking.</p>
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" placeholder="you@getscrollmedia.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button class="btn-login" type="submit" id="login-btn">Sign In</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     MAIN APP
     ═══════════════════════════════════════════════════════════════ -->
<div id="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <img src="/scroll-media-logo.svg" alt="Scroll Media" onerror="this.style.display='none'">
      </div>
      <div class="sidebar-badge">⚡ Dashboard</div>
    </div>
    <div class="sidebar-user">
      <div class="sidebar-user-name" id="sidebar-user-name">—</div>
      <div class="sidebar-user-role" id="sidebar-user-role">—</div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Populated by JS -->
    </nav>
    <div class="sidebar-footer">
      <button class="btn-sync" id="sync-btn" onclick="syncData()">
        <span class="spin">↻</span> Sync Data
      </button>
      <div class="last-sync" id="last-sync-time">Never synced</div>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-title" id="topbar-title">Overview</span>
        <span class="topbar-period" id="topbar-period">Loading...</span>
      </div>
      <div class="topbar-right">
        <div class="health-pill mid" id="agency-health-pill">
          <div class="health-dot"></div>
          <span id="agency-health-text">—</span>
        </div>
      </div>
    </div>

    <div class="content" id="content">
      <div class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading dashboard...</div>
      </div>
    </div>
  </main>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════ */
const STATE = {
  session: null,   // { token, role, name, am }
  data: null,      // API response
  view: 'overview', // 'overview' | 'account'
  activeAccount: null,
  charts: {},
};

/* ═══════════════════════════════════════════════════════════════
   AUTH
   ═══════════════════════════════════════════════════════════════ */
async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  errEl.style.display = 'none';

  try {
    const res = await fetch('/api/dashboard-auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();

    if (!res.ok || !data.token) {
      throw new Error(data.error || 'Invalid credentials');
    }

    STATE.session = data;
    localStorage.setItem('dash_token', data.token);
    localStorage.setItem('dash_session', JSON.stringify(data));
    bootApp();
  } catch (err) {
    errEl.textContent = err.message || 'Login failed. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

async function checkSession() {
  const saved = localStorage.getItem('dash_session');
  const token = localStorage.getItem('dash_token');
  if (!saved || !token) return false;

  try {
    const res = await fetch('/api/dashboard-session', {
      headers: { 'Authorization': `Bearer ${token}` },
    });
    if (!res.ok) {
      localStorage.removeItem('dash_token');
      localStorage.removeItem('dash_session');
      return false;
    }
    const data = await res.json();
    if (!data.valid) {
      localStorage.removeItem('dash_token');
      localStorage.removeItem('dash_session');
      return false;
    }
    STATE.session = { ...JSON.parse(saved), ...data };
    return true;
  } catch {
    return false;
  }
}

function logout() {
  localStorage.removeItem('dash_token');
  localStorage.removeItem('dash_session');
  STATE.session = null;
  STATE.data = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

/* ═══════════════════════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════════════════════ */
async function bootApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  // Set user info
  document.getElementById('sidebar-user-name').textContent = STATE.session.name || '—';
  document.getElementById('sidebar-user-role').textContent =
    STATE.session.role === 'executive' ? 'Executive View' : 'Account Manager';

  // Build nav
  buildNav();

  // Load data
  await syncData();
}

function buildNav() {
  const nav = document.getElementById('sidebar-nav');
  const isExec = STATE.session.role === 'executive';

  let html = '';

  if (isExec) {
    html += `<div class="nav-section-label">Executive</div>`;
    html += navItem('overview', '📊', 'Agency Overview', null, true);
    html += `<div class="nav-section-label" style="margin-top:12px">Account Managers</div>`;
    html += navItem('am-riley', '👤', 'Riley Walker', '4');
    html += navItem('am-emily', '👤', 'Emily Krintz', '2');
    html += navItem('am-rachel', '👤', 'Rachel Dina', '3');
    html += `<div class="nav-section-label" style="margin-top:12px">All Accounts</div>`;
    const clients = ['Skin by Brownlee','Launch Party','MEAS Active','Plas Dentistry','DEFINE Oakley','Ombre Gallery','Up & Running','Lane & Kate','Holos House'];
    clients.forEach(c => {
      html += navItem('account-' + slugify(c), '◦', c, null);
    });
  } else {
    html += `<div class="nav-section-label">My Accounts</div>`;
    html += navItem('overview', '📊', 'My Overview', null, true);
  }

  nav.innerHTML = html;
}

function navItem(id, icon, label, count, active = false) {
  const countHtml = count ? `<span class="nav-count">${count}</span>` : '';
  return `<div class="nav-item ${active ? 'active' : ''}" onclick="navClick('${id}')" id="nav-${id}">
    <span class="nav-icon">${icon}</span>
    <span>${label}</span>
    ${countHtml}
  </div>`;
}

function slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
}

function navClick(id) {
  // Update active state
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + id);
  if (navEl) navEl.classList.add('active');

  if (id === 'overview') {
    renderOverview();
  } else if (id.startsWith('am-')) {
    const amMap = { 'am-riley': 'Riley Walker', 'am-emily': 'Emily Krintz', 'am-rachel': 'Rachel Dina' };
    renderAMView(amMap[id]);
  } else if (id.startsWith('account-')) {
    const slug = id.replace('account-', '');
    const client = STATE.data?.clients?.find(c => slugify(c.name) === slug);
    if (client) renderAccountDetail(client);
  }
}

/* ═══════════════════════════════════════════════════════════════
   DATA SYNC
   ═══════════════════════════════════════════════════════════════ */
async function syncData() {
  const btn = document.getElementById('sync-btn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.innerHTML = '<span class="spin">↻</span> Syncing...';

  const content = document.getElementById('content');
  content.innerHTML = `<div class="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Pulling live data from Metricool...</div>
  </div>`;

  try {
    const token = localStorage.getItem('dash_token');
    const amParam = STATE.session.role === 'am' && STATE.session.am
      ? `?am=${encodeURIComponent(STATE.session.am)}`
      : '';

    const res = await fetch(`/api/metricool-data${amParam}`, {
      headers: { 'Authorization': `Bearer ${token}` },
    });

    if (!res.ok) throw new Error('Failed to fetch data');
    STATE.data = await res.json();

    // Update topbar
    updateTopbar();

    // Render default view
    renderOverview();

    // Update sync time
    const now = new Date();
    document.getElementById('last-sync-time').textContent =
      `Synced ${now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}`;

  } catch (err) {
    content.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">⚠️</div>
      <div class="empty-state-title">Failed to load data</div>
      <div class="empty-state-sub">${err.message}. Try syncing again.</div>
    </div>`;
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.innerHTML = '<span class="spin">↻</span> Sync Data';
  }
}

function updateTopbar() {
  if (!STATE.data) return;
  const { agency, period } = STATE.data;

  const monthName = new Date().toLocaleString('en-US', { month: 'long' });
  document.getElementById('topbar-period').textContent =
    `${monthName} · Day ${period.daysElapsed} of ${new Date(new Date().getFullYear(), new Date().getMonth()+1,0).getDate()}`;

  const score = agency.avgHealth;
  const pill = document.getElementById('agency-health-pill');
  const text = document.getElementById('agency-health-text');
  text.textContent = `Agency Health ${score}%`;
  pill.className = 'health-pill ' + (score >= 70 ? 'good' : score >= 45 ? 'mid' : 'low');
}

/* ═══════════════════════════════════════════════════════════════
   RENDER: EXECUTIVE OVERVIEW
   ═══════════════════════════════════════════════════════════════ */
function renderOverview() {
  if (!STATE.data) return;
  const { agency, clients } = STATE.data;
  const isExec = STATE.session.role === 'executive';

  document.getElementById('topbar-title').textContent = isExec ? 'Agency Overview' : 'My Accounts';

  // Destroy old charts
  Object.values(STATE.charts).forEach(c => c.destroy());
  STATE.charts = {};

  const content = document.getElementById('content');

  if (isExec) {
    // Agency stat cards
    const totalViews = fmtNum(agency.totalViews);
    const totalSaves = fmtNum(agency.totalSaves);

    content.innerHTML = `
      <!-- Agency Stats -->
      <div class="agency-stats">
        <div class="stat-card">
          <div class="stat-label">Avg Agency Health</div>
          <div class="stat-value highlight">${agency.avgHealth}%</div>
          <div class="stat-sub">${agency.aboveCount} of ${agency.totalClients} accounts above target</div>
          <div class="stat-icon">📈</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Views (MTD)</div>
          <div class="stat-value">${totalViews}</div>
          <div class="stat-sub">Across all ${agency.totalClients} accounts</div>
          <div class="stat-icon">👁</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Saves (MTD)</div>
          <div class="stat-value">${totalSaves}</div>
          <div class="stat-sub">High-intent engagement signal</div>
          <div class="stat-icon">🔖</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active Accounts</div>
          <div class="stat-value">${agency.totalClients}</div>
          <div class="stat-sub">3 AMs · Spark / Lift / Rise</div>
          <div class="stat-icon">🏢</div>
        </div>
      </div>

      <!-- AM Columns -->
      <div class="section-header">
        <div class="section-title">Account Manager Portfolios</div>
      </div>
      <div class="am-columns" id="am-columns"></div>

      <!-- All Accounts List -->
      <div class="section-header">
        <div class="section-title">All Accounts</div>
      </div>
      <div class="account-list" id="all-accounts"></div>
    `;

    // Render AM columns
    renderAMColumns(clients);

    // Render all accounts list
    const listEl = document.getElementById('all-accounts');
    listEl.innerHTML = clients.map(c => accountRowHTML(c)).join('');
    clients.forEach(c => renderMiniSparkline(c));

  } else {
    // AM view — just their accounts
    content.innerHTML = `
      <div class="section-header">
        <div class="section-title">My Accounts</div>
      </div>
      <div class="account-list" id="all-accounts"></div>
    `;
    const listEl = document.getElementById('all-accounts');
    listEl.innerHTML = clients.map(c => accountRowHTML(c)).join('');
    clients.forEach(c => renderMiniSparkline(c));
  }
}

function renderAMColumns(clients) {
  const ams = [
    { id: 'riley', name: 'Riley Walker', initials: 'RW', cls: 'riley' },
    { id: 'emily', name: 'Emily Krintz', initials: 'EK', cls: 'emily' },
    { id: 'rachel', name: 'Rachel Dina', initials: 'RD', cls: 'rachel' },
  ];

  const container = document.getElementById('am-columns');
  container.innerHTML = ams.map(am => {
    const amClients = clients.filter(c => c.am === am.name);
    const avgHealth = amClients.length
      ? Math.round(amClients.reduce((s, c) => s + c.healthScore, 0) / amClients.length)
      : 0;
    const healthCls = avgHealth >= 70 ? 'good' : avgHealth >= 45 ? 'mid' : 'low';

    const accountsHTML = amClients.map(c => {
      const barCls = c.healthScore >= 70 ? 'bar-good' : c.healthScore >= 45 ? 'bar-mid' : 'bar-low';
      const kpiDots = Object.values(c.kpis).map(k =>
        k ? `<div class="kpi-dot ${k.status}" title="${k.label}: ${k.status}"></div>` : ''
      ).join('');

      return `<div class="account-mini" onclick="openAccount('${slugify(c.name)}')">
        <div class="account-mini-top">
          <div class="account-mini-name">${c.name}</div>
          <div class="account-mini-stage stage-${c.stage.toLowerCase()}">${c.stage}</div>
        </div>
        <div class="account-mini-handle">${c.instagram}</div>
        <div class="account-mini-bar">
          <div class="account-mini-bar-fill ${barCls}" style="width:${c.healthScore}%"></div>
        </div>
        <div class="account-mini-kpis">${kpiDots}</div>
      </div>`;
    }).join('');

    return `<div class="am-column">
      <div class="am-column-header">
        <div class="am-avatar ${am.cls}">${am.initials}</div>
        <div>
          <div class="am-name">${am.name}</div>
          <div class="am-count">${amClients.length} accounts</div>
        </div>
        <div class="am-health-score ${healthCls}">${avgHealth}%</div>
      </div>
      <div class="am-accounts">${accountsHTML}</div>
    </div>`;
  }).join('');
}

function accountRowHTML(c) {
  const healthCls = c.healthScore >= 70 ? 'good' : c.healthScore >= 45 ? 'mid' : 'low';
  const kpiChips = Object.values(c.kpis).map(k => {
    if (!k) return '';
    const val = k.key === 'retention' ? `${k.value ?? '—'}%` : fmtNum(k.value);
    return `<div class="kpi-chip ${k.status}" title="${k.label}">
      ${k.label.split(' ')[0]}: ${val}
    </div>`;
  }).join('');

  return `<div class="account-row" onclick="openAccount('${slugify(c.name)}')">
    <div class="account-row-left">
      <div class="account-row-name">
        ${c.name}
        <span class="account-mini-stage stage-${c.stage.toLowerCase()}">${c.stage}</span>
        ${c.am ? `<span class="tag tag-azure">${c.am.split(' ')[0]}</span>` : ''}
      </div>
      <div class="account-row-meta">${c.instagram} · ${c.niche}</div>
      <div class="account-row-kpis">${kpiChips}</div>
    </div>
    <div class="account-row-right">
      <div class="account-health-score ${healthCls}">${c.healthScore}%</div>
      <div class="account-health-label">Health Score</div>
      <div class="account-sparkline-wrap">
        <canvas id="spark-${slugify(c.name)}" width="100" height="36"></canvas>
      </div>
    </div>
  </div>`;
}

function renderMiniSparkline(c) {
  const canvasId = `spark-${slugify(c.name)}`;
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  const data = c.sparkline || [0,0,0,0];
  const max = Math.max(...data, 1);
  const color = c.healthScore >= 70 ? '#22c55e' : c.healthScore >= 45 ? '#f59e0b' : '#ef4444';

  if (STATE.charts[canvasId]) STATE.charts[canvasId].destroy();
  STATE.charts[canvasId] = new Chart(canvas, {
    type: 'line',
    data: {
      labels: ['W-4','W-3','W-2','W-1'],
      datasets: [{
        data,
        borderColor: color,
        borderWidth: 2,
        fill: true,
        backgroundColor: color + '18',
        tension: 0.4,
        pointRadius: 0,
      }],
    },
    options: {
      responsive: false,
      animation: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: { x: { display: false }, y: { display: false, min: 0, max: max * 1.2 } },
    },
  });
}

/* ═══════════════════════════════════════════════════════════════
   RENDER: AM FILTER VIEW
   ═══════════════════════════════════════════════════════════════ */
function renderAMView(amName) {
  if (!STATE.data) return;
  const clients = STATE.data.clients.filter(c => c.am === amName);
  document.getElementById('topbar-title').textContent = amName;

  Object.values(STATE.charts).forEach(c => c.destroy());
  STATE.charts = {};

  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="section-header">
      <div class="section-title">${amName}'s Accounts</div>
    </div>
    <div class="account-list" id="all-accounts"></div>
  `;

  const listEl = document.getElementById('all-accounts');
  listEl.innerHTML = clients.map(c => accountRowHTML(c)).join('');
  clients.forEach(c => renderMiniSparkline(c));
}

/* ═══════════════════════════════════════════════════════════════
   RENDER: ACCOUNT DETAIL
   ═══════════════════════════════════════════════════════════════ */
function openAccount(slug) {
  const client = STATE.data?.clients?.find(c => slugify(c.name) === slug);
  if (!client) return;
  renderAccountDetail(client);

  // Update nav
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-account-' + slug);
  if (navEl) navEl.classList.add('active');
}

function renderAccountDetail(client) {
  document.getElementById('topbar-title').textContent = client.name;

  Object.values(STATE.charts).forEach(c => c.destroy());
  STATE.charts = {};

  const content = document.getElementById('content');
  const healthCls = client.healthScore >= 70 ? 'good' : client.healthScore >= 45 ? 'mid' : 'low';
  const goals = client.goals || {};

  // Build KPI cards HTML
  const kpiOrder = ['views','saves','shares','comments','retention'];
  const kpiHTML = kpiOrder.map(key => {
    const k = client.kpis[key];
    if (!k) return '';
    const val = key === 'retention' ? `${k.value ?? '—'}%` : fmtNum(k.value);
    const target = key === 'retention'
      ? `Target: ${k.floor}–${k.ceiling}%`
      : `Target: ${fmtNum(k.proratedFloor)}–${fmtNum(k.proratedCeiling)} (prorated)`;
    const statusLabel = k.status === 'above' ? 'Above' : k.status === 'on-track' ? 'On Track' : k.status === 'below' ? 'Below' : '—';

    return `<div class="kpi-card ${k.status}">
      <div class="kpi-status-badge">${statusLabel}</div>
      <div class="kpi-card-label">${k.label}</div>
      <div class="kpi-card-value">${val}</div>
      <div class="kpi-card-target">${target}</div>
      <div class="kpi-progress-bar">
        <div class="kpi-progress-fill" style="width:${k.progress}%"></div>
      </div>
    </div>`;
  }).join('');

  content.innerHTML = `
    <!-- Header -->
    <div class="account-detail-header">
      <div class="account-detail-info">
        <div class="account-detail-name">
          ${client.name}
          <span class="account-mini-stage stage-${client.stage.toLowerCase()}">${client.stage}</span>
        </div>
        <div class="account-detail-meta">
          <span>📱 ${client.instagram}</span>
          <span>🏷 ${client.niche}</span>
          <span>👤 ${client.am}</span>
          <span>📅 Day ${client.daysElapsed} of ${client.daysInMonth}</span>
        </div>
      </div>
      <div style="text-align:right">
        <div class="account-health-score ${healthCls}" style="font-size:40px">${client.healthScore}%</div>
        <div class="account-health-label">Health Score</div>
      </div>
      <button class="back-btn" onclick="renderOverview()">← Back</button>
    </div>

    <!-- Funnel Goals -->
    <div class="section-header">
      <div class="section-title">Funnel Goals</div>
    </div>
    <div class="funnel-goals">
      <div class="funnel-card tofu">
        <div class="funnel-label">TOFU · Awareness</div>
        <div class="funnel-stage-name">Top of Funnel</div>
        <div class="funnel-goal-text">${goals.tofu || '—'}</div>
      </div>
      <div class="funnel-card mofu">
        <div class="funnel-label">MOFU · Engagement</div>
        <div class="funnel-stage-name">Middle of Funnel</div>
        <div class="funnel-goal-text">${goals.mofu || '—'}</div>
      </div>
      <div class="funnel-card bofu">
        <div class="funnel-label">BOFU · Conversion</div>
        <div class="funnel-stage-name">Bottom of Funnel</div>
        <div class="funnel-goal-text">${goals.bofu || '—'}</div>
      </div>
    </div>

    <!-- KPI Cards -->
    <div class="section-header">
      <div class="section-title">KPI Tracking — Month to Date</div>
    </div>
    <div class="kpi-grid">${kpiHTML}</div>

    <!-- Sparkline Trend -->
    <div class="sparkline-section">
      <div class="sparkline-header">
        <div>
          <div class="sparkline-title">4-Week Views Trend</div>
          <div class="sparkline-sub">Weekly total views — last 4 weeks</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:20px;font-weight:800;color:var(--text-1)">${fmtNum(client.current.views)}</div>
          <div style="font-size:11px;color:var(--text-3)">Views this month</div>
        </div>
      </div>
      <div class="sparkline-chart-wrap">
        <canvas id="trend-chart"></canvas>
      </div>
    </div>

    <!-- Post Activity -->
    <div class="posts-section">
      <div class="section-title">Post Activity — This Month</div>
      <div class="posts-grid">
        <div class="post-stat">
          <div class="post-stat-value">${client.current.reelCount ?? '—'}</div>
          <div class="post-stat-label">Reels Published</div>
        </div>
        <div class="post-stat">
          <div class="post-stat-value">${client.current.postCount ?? '—'}</div>
          <div class="post-stat-label">Feed Posts</div>
        </div>
        <div class="post-stat">
          <div class="post-stat-value">${client.current.storyCount ?? '—'}</div>
          <div class="post-stat-label">Stories</div>
        </div>
      </div>
    </div>
  `;

  // Render trend chart
  renderTrendChart(client);
}

function renderTrendChart(client) {
  const canvas = document.getElementById('trend-chart');
  if (!canvas) return;

  const data = client.sparkline || [0,0,0,0];
  const color = client.healthScore >= 70 ? '#22c55e' : client.healthScore >= 45 ? '#f59e0b' : '#ef4444';

  STATE.charts['trend'] = new Chart(canvas, {
    type: 'line',
    data: {
      labels: ['4 Weeks Ago', '3 Weeks Ago', '2 Weeks Ago', 'Last Week'],
      datasets: [{
        label: 'Views',
        data,
        borderColor: color,
        borderWidth: 2.5,
        fill: true,
        backgroundColor: color + '15',
        tension: 0.4,
        pointRadius: 5,
        pointBackgroundColor: color,
        pointBorderColor: '#1e2a3a',
        pointBorderWidth: 2,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e2a3a',
          borderColor: 'rgba(240,244,255,0.12)',
          borderWidth: 1,
          titleColor: '#f0f4ff',
          bodyColor: 'rgba(240,244,255,0.65)',
          callbacks: {
            label: ctx => ` ${fmtNum(ctx.raw)} views`,
          },
        },
      },
      scales: {
        x: {
          grid: { color: 'rgba(240,244,255,0.05)' },
          ticks: { color: 'rgba(240,244,255,0.38)', font: { size: 11 } },
        },
        y: {
          grid: { color: 'rgba(240,244,255,0.05)' },
          ticks: {
            color: 'rgba(240,244,255,0.38)',
            font: { size: 11 },
            callback: v => fmtNum(v),
          },
        },
      },
    },
  });
}

/* ═══════════════════════════════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════════════════════════════ */
function fmtNum(n) {
  if (n == null || n === undefined) return '—';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toString();
}

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */
(async function init() {
  const valid = await checkSession();
  if (valid) {
    bootApp();
  }
  // Otherwise login screen is already visible
})();
</script>
</body>
</html>
